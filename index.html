<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenCitizen · Trigger Worklist</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#F7F6F2; --card:#ffffff; --ink:#1A1A18; --muted:#6B6A64;
    --line:#E4E2DA; --line-soft:#EEEDE7;
    --gc:#1D9E75; --gc-deep:#0F6E56; --gc-ink:#085041;
    --s3-bg:#E1F5EE; --s3-tx:#085041;
    --s2-bg:#FAEEDA; --s2-tx:#633806;
    --s1-bg:#F1EFE8; --s1-tx:#5F5E5A;
    --link:#185FA5;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:980px;margin:0 auto;padding:28px 22px 80px}

  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;
    padding-bottom:18px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px}
  .mark{width:34px;height:34px;border-radius:9px;background:var(--gc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mark svg{width:19px;height:19px}
  .brand h1{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .brand p{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-top:1px}
  .runmeta{font-size:12.5px;color:var(--muted);text-align:right}
  .runmeta b{color:var(--ink);font-weight:600}
  .mode{display:inline-block;margin-top:4px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 8px;border-radius:20px;background:var(--s2-bg);color:var(--s2-tx)}
  .mode.live{background:var(--s3-bg);color:var(--s3-tx)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0 8px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .stat .n{font-size:23px;font-weight:600;letter-spacing:-.02em}
  .stat .n.g{color:var(--gc-ink)} .stat .n.a{color:var(--s2-tx)}
  .stat .l{font-size:11.5px;color:var(--muted);margin-top:2px}

  /* tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-top:20px}
  .tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;
    border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:.12s}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--gc-ink);border-bottom-color:var(--gc)}
  .tab-right{margin-left:auto}

  .controls{display:flex;align-items:center;column-gap:8px;row-gap:14px;flex-wrap:wrap;padding:16px 18px;margin:18px 0;border:1px solid var(--line);border-radius:12px;background:var(--card)}
  .flab{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-right:2px}
  .chip{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit;transition:.12s}
  .chip:hover{border-color:var(--muted);color:var(--ink)}
  .chip.on{background:var(--gc);border-color:var(--gc);color:#fff}
  .spacer{flex:1}
  .toggle{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;margin-left:auto}
  .search{flex:1;min-width:200px;padding:8px 13px;border:1px solid var(--line);border-radius:9px;
    font-family:inherit;font-size:13px;color:var(--ink);background:var(--card)}
  .sel-filter{font-size:12.5px;border:1px solid var(--line);border-radius:9px;padding:7px 10px;
    background:var(--card);color:var(--ink);cursor:pointer;font-family:inherit}
  .count{font-size:12px;color:var(--muted);margin:10px 2px}
  .loadmore{display:block;margin:18px auto 0;padding:9px 22px;font-size:12.5px;font-weight:600;
    border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--gc-ink);cursor:pointer;font-family:inherit}
  .loadmore:hover{border-color:var(--gc)}

  /* status action buttons on each card */
  .sbtns{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
  .sbtn{font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit;transition:.12s}
  .sbtn:hover{border-color:var(--muted);color:var(--ink)}
  .sbtn.on-contacted{background:var(--s3-bg);border-color:var(--s3-bg);color:var(--s3-tx)}
  .sbtn.on-hold{background:var(--s2-bg);border-color:var(--s2-bg);color:var(--s2-tx)}
  .sbtn.on-notrelevant{background:var(--s1-bg);border-color:var(--s1-bg);color:var(--s1-tx)}
  .sbtn.on-monitor{background:#E6F1FB;border-color:#E6F1FB;color:#0C447C}

  /* pagination */
  .pager{display:flex;align-items:center;justify-content:center;gap:16px;margin:22px 0 8px}
  .pbtn{font-size:12.5px;font-weight:600;padding:7px 16px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);color:var(--gc-ink);cursor:pointer;font-family:inherit}
  .pbtn:hover:not(:disabled){border-color:var(--gc)}
  .pbtn:disabled{opacity:.4;cursor:default}
  .pinfo{font-size:12.5px;color:var(--muted)}

  /* confirmation modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,20,18,.44);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:var(--card);border-radius:16px;max-width:420px;width:100%;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.22)}
  .modal-title{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:8px}
  .modal-body{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:20px}
  .modal-body b{color:var(--ink);font-weight:600}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px}
  .mbtn{font-size:13px;font-weight:600;padding:9px 18px;border-radius:9px;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--card);color:var(--ink)}
  .mbtn-cancel:hover{border-color:var(--muted)}
  .mbtn-ok{background:var(--gc);border-color:var(--gc);color:#fff}
  .mbtn-ok:hover{background:var(--gc-deep)}

  /* login gate */
  #gate{min-height:100vh;align-items:center;justify-content:center;padding:24px}
  .gate-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 30px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(0,0,0,.06)}
  .gate-brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
  .gate-brand h1{font-size:16px;font-weight:600;letter-spacing:-.01em;margin:0}
  .gate-brand p{font-size:12px;color:var(--muted);margin:2px 0 0}
  .gate-l{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 6px}
  .gate-in{width:100%;box-sizing:border-box;font-size:14px;font-family:inherit;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);margin-bottom:16px}
  .gate-in:focus{outline:none;border-color:var(--gc);background:var(--card)}
  .gate-btn{width:100%;font-size:14px;font-weight:600;font-family:inherit;padding:12px;border-radius:10px;border:none;background:var(--gc);color:#fff;cursor:pointer;margin-top:4px}
  .gate-btn:hover{background:var(--gc-deep)}
  .gate-btn:disabled{opacity:.6;cursor:default}
  .gate-err{font-size:12.5px;color:#B4231A;margin:12px 0 0;min-height:1em}
  .signout{font-size:11.5px;font-weight:600;font-family:inherit;color:var(--muted);background:none;border:1px solid var(--line);border-radius:7px;padding:4px 10px;cursor:pointer;margin-top:6px}
  .signout:hover{border-color:var(--muted);color:var(--ink)}

  .group{margin-top:26px}
  .ghead{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .ghead .dot{width:8px;height:8px;border-radius:50%}
  .ghead.g3 .dot{background:var(--gc)} .ghead.g2 .dot{background:#EF9F27} .ghead.g1 .dot{background:#B4B2A9}
  .ghead h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink)}
  .ghead .sub{font-size:12px;color:var(--muted)}
  .gcount{font-size:11.5px;color:var(--muted);background:var(--line-soft);padding:1px 8px;border-radius:20px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:.12s}
  .card:hover{border-color:#D4D2C8}
  .card.handled{opacity:1}
  .card.is-handled{border-color:#CFE9DF;background:linear-gradient(0deg,rgba(29,158,117,.03),rgba(29,158,117,.03)),var(--card)}
  .crow{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .company{font-size:15.5px;font-weight:600;letter-spacing:-.01em}
  .trigger{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.45}
  .score{flex-shrink:0;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
  .score.s3{background:var(--s3-bg);color:var(--s3-tx)} .score.s2{background:var(--s2-bg);color:var(--s2-tx)} .score.s1{background:var(--s1-bg);color:var(--s1-tx)}

  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:11px 0 0}
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px}
  .p-layoff{background:#FCEBEB;color:#791F1F} .p-fund{background:#EEEDFE;color:#3C3489}
  .p-job{background:#EAF3DE;color:#27500A} .p-move{background:#E6F1FB;color:#0C447C} .p-rfp{background:#FAEEDA;color:#633806}
  .metatext{font-size:12px;color:var(--muted)}
  .metatext b{color:var(--ink);font-weight:500}
  .agetag{font-size:11px;color:var(--muted);background:var(--line-soft);padding:2px 9px;border-radius:20px;margin-left:auto}
  .disco{font-size:11px;color:var(--muted);font-style:italic}
  .statustag{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:20px;vertical-align:middle;margin-left:6px}
  .st-Contacted{background:var(--s3-bg);color:var(--s3-tx)} .st-Hold{background:var(--s2-bg);color:var(--s2-tx)}
  .st-Monitor{background:#E6F1FB;color:#0C447C}
  .st-Notrelevant{background:var(--s1-bg);color:var(--s1-tx)}

  .opener{margin:13px 0 0;padding:12px 14px;background:var(--paper);border:1px solid var(--line-soft);
    border-radius:9px;font-size:13px;line-height:1.55;color:#39382F;font-style:italic}
  .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px}
  .verify{font-size:12.5px;color:var(--link);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:4px}
  .verify:hover{text-decoration:underline}
  .verify svg{width:12px;height:12px}
  .btn{font-size:12.5px;font-weight:600;padding:7px 15px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;transition:.12s}
  .btn-copy{background:var(--gc);color:#fff} .btn-copy:hover{background:var(--gc-deep)}
  .sel{font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:var(--card);
    color:var(--ink);cursor:pointer;font-family:inherit;margin-left:auto}
  .why{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;margin-top:9px;display:inline-flex;align-items:center;gap:5px}
  .why:hover{color:var(--ink)}
  .rationale{display:none;margin-top:8px;font-size:12.5px;color:var(--muted);line-height:1.5;
    padding:10px 13px;border-left:2px solid var(--gc);background:var(--paper);border-radius:0 8px 8px 0}
  .rationale.open{display:block}

  .empty{padding:40px;text-align:center;color:var(--muted);font-size:13.5px;
    background:var(--card);border:1px dashed var(--line);border-radius:14px}
  .banner{font-size:12.5px;color:var(--s2-tx);background:var(--s2-bg);border:1px solid #F0D9A8;
    border-radius:10px;padding:10px 14px;margin:16px 0 0;line-height:1.5}
  @media(max-width:640px){ .stats{grid-template-columns:repeat(2,1fr)} .sel{margin-left:0} }
</style>
</head>

<script>
/* ============================================================

const SUPABASE_URL = "https://ydexaoiabbtjuuonzvjc.supabase.co";
const SUPABASE_KEY = "sb_publishable_iEkHDF3Adt494FspnGAQ9g_15PQ9Kxr";

const STATUSES = ["New","Contacted","Not relevant","Hold","Monitor"];

const $ = s => document.querySelector(s);
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const iso = d => d.toISOString().slice(0,10);
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return iso(d); }
function dayLabel(rd){
  if(!rd) return "";
  const t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.round((t-new Date(rd+"T00:00:00"))/86400000);
  if(diff<=0) return ""; if(diff===1) return "Yesterday"; return diff+" days ago";
}
// Entry date = when the lead landed in our system (created_at). Falls back to
// run_date for older rows that predate the column.
function entryDate(l){
  const src = l.created_at || (l.run_date ? l.run_date+"T12:00:00Z" : null);
  if(!src) return null;
  const d = new Date(src);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function entryLabel(l){
  const d = entryDate(l); if(!d) return "";
  const lbl = dayLabel(d);
  if(!lbl) return "Entered today";
  return "Entered " + (lbl==="Yesterday" ? "yesterday" : lbl);
}
function announcedLabel(l){
  if(!l.run_date) return "";
  const dt = new Date(l.run_date+"T00:00:00");
  return "announced " + dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function entryCutoffISO(days){ const d=new Date(); d.setDate(d.getDate()-days); return d.toISOString(); }

/* demo rows, dated relative to today so the tabs behave correctly */
const SAMPLE = [
  {id:1,run_date:daysAgo(0),company:"Keywords International Limited Group",trigger_text:"128-person permanent layoff in San Francisco, effective Aug 22 2026",trigger_type:"layoff",score:3,location:"San Francisco",contact_title:"IT Manager",source:"CA WARN, 2026-06-22",source_url:"https://edd.ca.gov/en/jobs_and_training/Layoff_Services_WARN/",opener:"Saw Keywords' San Francisco workforce reduction filing \u2014 a change that size usually leaves a wave of laptops and monitors behind, and we can take those off your team's hands with free pickup and certified data erasure.",rationale:"Downtown SF office, large in-area layoff \u2014 near-certain equipment volume; contact this week.",status:"New"},

  {id:4,run_date:daysAgo(3),company:"Walmart (Sunnyvale tech site)",trigger_text:"67-person layoff at 1345 Crossman Ave, Sunnyvale",trigger_type:"layoff",score:2,location:"Sunnyvale",contact_title:"IT Asset Manager",source:"CA WARN, 2026-06-19",source_url:"https://edd.ca.gov/en/jobs_and_training/Layoff_Services_WARN/",opener:"Noticed the workforce changes at the Sunnyvale Crossman Ave site \u2014 if IT equipment is coming off desks, we offer free Bay Area pickup with documented data destruction.",rationale:"Verify office vs store; large firm likely has an ITAD contract \u2014 scored 2.",status:"New"},
  {id:5,run_date:daysAgo(1),company:"Bay Area tech sector (broad)",trigger_text:"Relocation activity trending up \u2014 category signal only",trigger_type:"move",score:1,location:"Bay Area-wide",contact_title:"Monitor only",source:"CRE report, 2026-06",source_url:"https://news.theregistrysf.com/",opener:null,rationale:"Not a specific company \u2014 watch for named movers.",status:"Monitor"},

let loaded = false;            // guards against reloading leads on token refresh
let tab = "today";             // today | week | handled | all
let typeFilter = "all";
let search = "";
let allStatus = "all";         // status filter on the All tab
let handledStatus = "all";     // sub-filter on the Handled tab
let page = 1;

/* ---------- auth gate ---------- */
function showApp(inApp){
  document.getElementById('gate').style.display = inApp ? 'none' : 'flex';
  document.getElementById('app').style.display  = inApp ? 'block' : 'none';
  const lo=document.getElementById('logoutBtn');
  if(lo) lo.style.display = (inApp && live) ? 'inline-flex' : 'none';
}

// Load leads into the dashboard (client already exists; only runs once authorized).
async function loadData(){
  if(loaded) return;
  if(live){
    try{
      ALL = await fetchAll();
      $('#mode').textContent="live"; $('#mode').classList.add("live");
    }catch(e){
      ALL = SAMPLE.slice();
      $('#config-banner').innerHTML='<div class="banner">Couldn\u2019t reach your database \u2014 showing sample data. Check the URL and key at the top of the file.</div>';
    }
  } else {
    ALL = SAMPLE.slice();
    $('#config-banner').innerHTML='<div class="banner">Running on sample data (no login required). Paste your Project URL and publishable key at the top of this file to go live with team login.</div>';
  }
  loaded = true;
  $('#run').textContent = new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  renderStats();
  render();
}

// Sign-in handler
async function doLogin(){
  const email=$('#email').value.trim(), password=$('#password').value;
  const btn=$('#loginBtn'); const err=$('#loginError');
  err.textContent="";
  if(!email || !password){ err.textContent="Enter your email and password."; return; }
  btn.disabled=true; btn.textContent="Signing in\u2026";
  const { error } = await client.auth.signInWithPassword({ email, password });
  btn.disabled=false; btn.textContent="Sign in";
  if(error){ err.textContent = error.message || "Sign-in failed."; }
  // on success, onAuthStateChange fires and swaps to the dashboard
}

function boot(){
  if(live){
    // Attach handlers
    $('#loginBtn').onclick = doLogin;
    $('#password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    $('#email').addEventListener('keydown', e=>{ if(e.key==='Enter') $('#password').focus(); });
    $('#logoutBtn').onclick = ()=> client.auth.signOut();
    // React to auth state (fires an INITIAL_SESSION event on load, so this also sets the first screen)
    client.auth.onAuthStateChange((event, session)=>{
      if(event==='SIGNED_OUT'){ loaded=false; ALL=[]; showApp(false); return; }
      if(session){ showApp(true); loadData(); }
      else { showApp(false); }
    });
  } else {
    // Demo mode: no keys, no login required \u2014 straight to sample data
    showApp(true);
    loadData();
  }
}

// Load all leads in pages of 1000 (Supabase's per-request cap), newest entry first.
async function fetchAll(){
  const out=[]; let from=0; const size=1000;
  while(true){
    const { data, error } = await client.from('leads').select('*')
      .order('created_at',{ascending:false}).range(from, from+size-1);
    if(error) throw error;
    out.push(...(data||[]));
    if(!data || data.length < size) break;
    from += size;
    if(from > 20000) break;     // safety cap
  }
  return out;
}

function renderStats(){
  const recent = ALL.filter(l=>entryDate(l) >= daysAgo(RECENT_DAYS));
  $('#c-all').textContent  = recent.length;                                    // total triggers in last 7 days
  $('#c-3').textContent    = recent.filter(l=>l.score===3).length;             // high priority
  $('#c-2').textContent    = recent.filter(l=>l.score===2).length;             // medium priority
  $('#c-done').textContent = recent.filter(l=>HANDLED.includes(l.status)).length;
}

/* ---------- controls ---------- */
function typeChips(active){
  const chips=["all","layoff","fund","job","move","rfp"];
  const label={all:"All",layoff:"Layoffs",fund:"Funding",job:"IT hiring",move:"Moves",rfp:"RFPs"};
  return chips.map(f=>`<button class="chip ${active===f?'on':''}" onclick="setType('${f}')">${label[f]}</button>`).join("");
}

function buildControls(){
  const c=$('#controls');
  if(tab==="today" || tab==="week"){
    c.innerHTML = `<span class="flab">Type</span>` + typeChips(typeFilter);
  } else if(tab==="handled"){
    const sts=["all",...HANDLED];
    const slabel={all:"All handled",Contacted:"Contacted","Not relevant":"Not relevant",Hold:"Hold",Monitor:"Monitor"};
    c.innerHTML = `<span class="flab">Status</span>`
      + sts.map(s=>`<button class="chip ${handledStatus===s?'on':''}" onclick="setHandledStatus('${s}')">${slabel[s]}</button>`).join("")
      + `<div style="flex-basis:100%;height:0"></div>`
      + `<span class="flab">Type</span>` + typeChips(typeFilter);
  } else { // all
    c.innerHTML = `<input class="search" id="q" placeholder="Search company or trigger\u2026" value="${esc(search)}">`
      + `<select class="sel-filter" id="stf"><option value="all">Any status</option>`
        + STATUSES.map(s=>`<option value="${s}" ${allStatus===s?'selected':''}>${s}</option>`).join("")
      + `</select>`
      + `<div style="flex-basis:100%;height:0"></div>`
      + `<span class="flab">Type</span>` + typeChips(typeFilter);
    const q=$('#q');
    q.addEventListener('input', debounce(()=>{ search=q.value.trim(); page=1; renderList(); },250));
    $('#stf').addEventListener('change', e=>{ allStatus=e.target.value; page=1; renderList(); });
  }
}

/* ---------- data selection ---------- */
function getRows(){
  const byEntryDesc=(a,b)=>(entryDate(b)||"").localeCompare(entryDate(a)||"");
  let rows;
  if(tab==="today"){
    rows=ALL.filter(l=>entryDate(l)===daysAgo(0) && l.status==="New");
  } else if(tab==="week"){
    rows=ALL.filter(l=>entryDate(l) >= daysAgo(RECENT_DAYS) && l.status==="New");
  } else if(tab==="handled"){
    rows=ALL.filter(l=>HANDLED.includes(l.status));
    if(handledStatus!=="all") rows=rows.filter(l=>l.status===handledStatus);
  } else { // all
    rows=ALL.slice();
    if(allStatus!=="all") rows=rows.filter(l=>l.status===allStatus);
    if(search){ const t=search.toLowerCase();
      rows=rows.filter(l=>(l.company||"").toLowerCase().includes(t)
        || (l.trigger_text||"").toLowerCase().includes(t)
        || (l.location||"").toLowerCase().includes(t)); }
  }
  if(typeFilter!=="all") rows=rows.filter(l=>l.trigger_type===typeFilter);
  if(tab==="today" || tab==="week") rows.sort((a,b)=> (b.score-a.score) || byEntryDesc(a,b));
  else rows.sort(byEntryDesc);
  return rows;
}

function emptyMsg(){
  if(tab==="today")  return "No leads entered today yet.";
  if(tab==="handled") return handledStatus==="all" ? "No handled leads yet." : "No leads with status \u201c"+esc(handledStatus)+"\u201d.";
  if(tab==="all" && search) return "No leads match \u201c"+esc(search)+"\u201d.";
  return "Nothing matches this filter.";
}

/* ---------- render ---------- */
function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===tab));
  buildControls();
  renderList();
}

function renderList(){
  const rows=getRows();
  const total=rows.length;
  const pages=Math.max(1, Math.ceil(total/PAGE));
  if(page>pages) page=pages;
  const start=(page-1)*PAGE;
  const slice=rows.slice(start, start+PAGE);
  const list=$('#list'); list.innerHTML="";

  if(!total){ list.innerHTML=`<div class="empty">${emptyMsg()}</div>`; $('#pager').innerHTML=""; return; }

  if(tab==="today" || tab==="week"){
    const meta={3:{cls:"g3",label:"High Priority",sub:""},
                2:{cls:"g2",label:"Medium Priority",sub:""},
                1:{cls:"g1",label:"Low Priority",sub:""}};
    const totalByScore={3:0,2:0,1:0};
    rows.forEach(l=>{ if(totalByScore[l.score]!=null) totalByScore[l.score]++; });
    let lastScore=null;
    slice.forEach(l=>{
      if(l.score!==lastScore){
        const g=meta[l.score]||{cls:"g1",label:"Other",sub:""};
        const h=document.createElement('div'); h.className="group";
        h.innerHTML=`<div class="ghead ${g.cls}"><span class="dot"></span><h2>${g.label}</h2>${g.sub?`<span class="sub">\u2014 ${g.sub}</span>`:""}<span class="gcount">${totalByScore[l.score]||0}</span></div>`;
        list.appendChild(h);
        lastScore=l.score;
      }
      list.appendChild(cardEl(l));
    });
  } else {
    const countEl=document.createElement('div'); countEl.className="count";
    countEl.textContent=`${total} lead${total===1?"":"s"}`;
    list.appendChild(countEl);
    slice.forEach(l=>list.appendChild(cardEl(l)));
  }
  renderPager(total, pages);
}

function renderPager(total, pages){
  const p=$('#pager');
  if(pages<=1){ p.innerHTML=""; return; }
  p.innerHTML = `<button class="pbtn" ${page<=1?'disabled':''} onclick="goPage(${page-1})">\u2039 Prev</button>`
    + `<span class="pinfo">Page ${page} of ${pages} \u00b7 ${total} leads</span>`
    + `<button class="pbtn" ${page>=pages?'disabled':''} onclick="goPage(${page+1})">Next \u203a</button>`;
}

/* ---------- card ---------- */
function statusButtons(l){
  const map=[["Contacted","on-contacted"],["Not relevant","on-notrelevant"],["Hold","on-hold"],["Monitor","on-monitor"]];
  return `<div class="sbtns">` + map.map(([s,cls])=>{
    const on = l.status===s;
    return `<button class="sbtn ${on?cls:''}" onclick='setStatus(${JSON.stringify(l.id)}, ${JSON.stringify(s)})'>${s}</button>`;
  }).join("") + `</div>`;
}

function cardEl(l){
  const c=document.createElement('div');
  const isHandled = HANDLED.includes(l.status);
  c.className = "card" + (isHandled ? " is-handled" : "");
  const pill={layoff:"p-layoff",fund:"p-fund",job:"p-job",move:"p-move",rfp:"p-rfp"}[l.trigger_type]||"p-move";
  const plabel={layoff:"Layoff",fund:"Funding",job:"IT hiring",move:"Office move",rfp:"RFP"}[l.trigger_type]||l.trigger_type;
  const entry=entryLabel(l);
  const disco=announcedLabel(l);
  const stbadge = isHandled ? `<span class="statustag st-${(l.status||'').replace(/ /g,'')}">${esc(l.status)}</span>` : "";
  const verify = l.source_url
    ? `<a class="verify" href="${esc(l.source_url)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>${l.opener?"Verify source":"Watch source"}</a>` : "";
  const copy = l.opener ? `<button class="btn btn-copy" onclick='copyOpener(${JSON.stringify(l.id)})'>Copy opener</button>` : "";
  const opener=l.opener?`<div class="opener">${esc(l.opener)}</div>`:"";
  c.innerHTML=`
    <div class="crow"><div>
      <div class="company">${esc(l.company)||"<span style='color:var(--muted)'>(company pending)</span>"} ${stbadge}</div>
      <div class="trigger">${esc(l.trigger_text)}</div>
    </div><div class="score s${l.score}">${l.score}</div></div>
    <div class="meta">
      <span class="pill ${pill}">${plabel}</span>
      <span class="metatext">${esc(l.location||"")}</span>
      ${l.contact_title&&l.contact_title!=="Monitor only"?`<span class="metatext">\u00b7 reach the <b>${esc(l.contact_title)}</b></span>`:""}
      ${disco?`<span class="disco">\u00b7 ${disco}</span>`:""}
      ${entry?`<span class="agetag">${entry}</span>`:""}
    </div>
    ${opener}
    <div class="actions">${verify}${copy}${statusButtons(l)}</div>
    ${l.rationale?`<button class="why" onclick='toggleWhy(this)'>Why score ${l.score}? \u203a</button><div class="rationale">${esc(l.rationale)}</div>`:""}`;
  return c;
}

/* ---------- actions ---------- */
function find(id){ return ALL.find(x=>String(x.id)===String(id)); }

function copyOpener(id){
  const l=find(id); if(!l||!l.opener) return;
  navigator.clipboard.writeText(l.opener).then(()=>{ event.target.textContent="Copied"; setTimeout(()=>event.target.textContent="Copy opener",1600); });
}

// Clicking a status button: confirm before moving an active lead into Handled.
function setStatus(id, clicked){
  const l=find(id); if(!l) return;
  if(l.status===clicked){ applyStatus(id, "New"); return; }        // click active status again -> back to worklist
  const movingToHandled = HANDLED.includes(clicked) && !HANDLED.includes(l.status);
  if(movingToHandled){
    askConfirm(`Move <b>${esc(l.company||'this trigger')}</b> to the Handled panel as <b>${esc(clicked)}</b>? It will leave your worklist.`,
               ()=>applyStatus(id, clicked));
  } else {
    applyStatus(id, clicked);
  }
}

async function applyStatus(id, next){
  const l=find(id); if(!l) return;
  l.status=next;
  if(live && client){ try{ await client.from('leads').update({status:next,updated_at:new Date().toISOString()}).eq('id',id);}catch(e){} }
  renderStats(); render();
}

/* ---------- confirmation modal ---------- */
function askConfirm(html, onOk){
  $('#modal-body').innerHTML = html;
  const ok=$('#modal-ok');
  ok.onclick = ()=>{ closeModal(); onOk(); };
  $('#modal').style.display = "flex";
}
function closeModal(){ $('#modal').style.display = "none"; $('#modal-ok').onclick = null; }

function toggleWhy(btn){ btn.nextElementSibling.classList.toggle('open'); }

function setType(f){ typeFilter=f; page=1; render(); }
function setHandledStatus(s){ handledStatus=s; page=1; render(); }
function goPage(n){ page=n; renderList(); window.scrollTo({top:0,behavior:'smooth'}); }
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{ tab=t.dataset.tab; page=1; render(); }));
boot();
</script>
</body>
</html>
